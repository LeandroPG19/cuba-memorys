name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.6.0) — used for release name and npm/PyPI skip check"
        required: false
        default: ""

# Prevent parallel runs for the same tag — avoids "already published" race conditions
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create GitHub Release + upload assets
  id-token: write   # PyPI trusted publishing (OIDC)

# ── 1. Build native binaries ─────────────────────────────────────────────────
jobs:
  build-binaries:
    name: Binary — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: cuba-memorys-linux-x64
            features: docs,cuda
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: cuba-memorys-linux-arm64
            use_cross: true
            features: docs
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: cuba-memorys-macos-x64
            features: docs
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cuba-memorys-macos-arm64
            features: docs
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: cuba-memorys-windows-x64.exe
            features: docs,cuda,directml

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --quiet

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (cargo)
        if: "!matrix.use_cross"
        working-directory: rust
        run: cargo build --release --features ${{ matrix.features }} --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        working-directory: rust
        run: cross build --release --features ${{ matrix.features }} --target ${{ matrix.target }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: cp rust/target/${{ matrix.target }}/release/cuba-memorys ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: cp rust/target/${{ matrix.target }}/release/cuba-memorys.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

# ── 2. Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: cuba-memorys ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*

# ── 3. PyPI — maturin wheels ──────────────────────────────────────────────────
#
# manylinux_2_28 (AlmaLinux 8): minimum glibc 2.28 (Ubuntu 20.04+, RHEL 8+).
# Upgrading from manylinux2014 (CentOS 7) fixes the aarch64 ring assembly issue
# in the old cross-compiler.
#
# OpenSSL strategy per target:
#   x86_64 : quay.io/pypa/manylinux_2_28_x86_64 ships runtime libssl but NOT
#             openssl-devel (headers). tls-native-vendored (vendored feature in
#             openssl-sys) tries to compile OpenSSL from source via Perl Configure
#             and fails in that container. Fix: install openssl-devel headers and
#             set OPENSSL_NO_VENDOR=1 to use system OpenSSL instead of vendored.
#   aarch64 : ghcr.io/rust-cross/manylinux_2_28-cross:aarch64 has a full
#             cross-compilation toolchain including Perl. tls-native-vendored
#             compiles OpenSSL from source successfully — no before-script needed.
#
# Publish is split into build + maturin upload --skip-existing so re-runs
# are idempotent (safe if the tag is re-pushed or the workflow is retried).
  publish-pypi:
    name: PyPI (${{ matrix.target }})
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            # Install openssl-devel for headers; OPENSSL_NO_VENDOR=1 overrides
            # tls-native-vendored so openssl-sys uses system OpenSSL instead of
            # trying to compile from source (which fails in this container).
            openssl_before_script: |
              yum install -y openssl-devel 2>&1 | tail -3
              export OPENSSL_NO_VENDOR=1
          - os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
            # cross container has full Perl; tls-native-vendored compiles OpenSSL
            # from source successfully. No before-script needed.
            openssl_before_script: ""
          - os: macos-latest
            target: universal2-apple-darwin
            manylinux: ""
            openssl_before_script: ""
          - os: windows-latest
            target: x86_64
            manylinux: ""
            openssl_before_script: ""
    environment:
      name: pypi
      url: https://pypi.org/project/cuba-memorys/
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features docs --out dist
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          before-script-linux: ${{ matrix.openssl_before_script }}

      - name: Upload to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          # --skip-existing makes re-runs idempotent (no 400 "file already exists")
          args: --skip-existing dist/*.whl
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

# ── 4. npm publish ─────────────────────────────────────────────────────────────
  publish-npm:
    name: npm
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/cuba-memorys
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm (skip if already published)
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view cuba-memorys version 2>/dev/null || echo "none")
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "Version $PKG_VERSION already published on npm — skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CUBA_MEMORYS_SKIP_INSTALL: "1"

# ── 5. MCP Registry ────────────────────────────────────────────────────────────
  publish-mcp-registry:
    name: MCP Registry
    needs: [publish-pypi, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: |
          OUTPUT=$(mcp-publisher publish 2>&1) && echo "$OUTPUT" || {
            if echo "$OUTPUT" | grep -q "duplicate version"; then
              echo "Version already published on MCP Registry — skipping."
            else
              echo "$OUTPUT" >&2
              exit 1
            fi
          }
