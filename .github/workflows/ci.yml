name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check + Clippy + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check

      - name: cargo fmt --check
        run: cargo fmt --check

      # --all-targets lints tests/ and examples/ too; -D promotes warnings to
      # errors. The old `-W clippy::all` only warned, and without --all-targets
      # clippy never even compiled rust/tests/.
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      # The `docs` feature ships in the release binaries, so it has to be tested like
      # the release binaries. It was not, and cuba_docs shipped to nobody for a whole
      # version: the published build is the DEFAULT build, and the feature was off by
      # default. A feature CI never compiles is a feature nobody is checking.
      - name: cargo clippy (--features docs)
        run: cargo clippy --all-targets --features docs -- -D warnings

      - name: cargo test (--features docs)
        run: cargo test --features docs

      - name: cargo audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit

      # The npm wrapper is how most people install this, and it once shipped a package
      # whose binary was never fetched. This smoke test loads bin.js/postinstall.js and
      # checks the fetch-on-first-use wiring without needing a network or a release —
      # a broken require or a renamed export here breaks every `npm install`.
      - name: npm wrapper smoke test
        working-directory: .
        run: node npm/install.test.js

  e2e:
    name: E2E Tests
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: cuba
          POSTGRES_PASSWORD: memorys2026
          POSTGRES_DB: brain
        ports:
          - 5488:5432
        options: >-
          --health-cmd "pg_isready -U cuba -d brain"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rust DB integration tests
        env:
          DATABASE_URL: postgresql://cuba:memorys2026@127.0.0.1:5488/brain
        run: |
          cargo test --test integration --test v08_project_scoping --test v09_integration -- --ignored --nocapture

      - name: Run E2E tests (25 MCP tools)
        env:
          DATABASE_URL: postgresql://cuba:memorys2026@127.0.0.1:5488/brain
          CUBA_BINARY_PATH: ./target/release/cuba-memorys
          CUBA_JUDGE: heuristic
        run: python tests/e2e_all_tools.py
