# cargo-deny configuration for cuba-memorys
# AI-3: Automated GPL/AGPL/SSPL rejection + advisory checking
#
# Usage: cargo install cargo-deny && cargo deny check
# CI: cargo deny check licenses advisories

[licenses]
# Dependencies stay permissive on purpose. cuba-memorys is AGPL-3.0, so a copyleft
# dependency would be legal to use, but it would also make a commercial dual-license
# impossible later: we can relicense our own code, not someone else's.
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
    "SSPL-1.0",
    "LGPL-2.1",
    "LGPL-3.0",
]
copyleft = "deny"
# Some crates don't have license info — warn but don't block
default = "warn"
confidence-threshold = 0.8

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Treat unmaintained crates as warnings (not errors)
unmaintained = "warn"
# Treat yanked versions as deny
yanked = "deny"
# Ignore specific advisories if needed (add IDs here)
ignore = [
    # RUSTSEC-2023-0071: rsa Marvin Attack via sqlx-mysql.
    # sqlx-mysql is in Cargo.lock but NOT compiled (no mysql feature).
    # Confirmed via `cargo tree -i sqlx-mysql` → "nothing to print".
    # No fix available upstream (sqlx side). False positive for our binary.
    { id = "RUSTSEC-2023-0071", reason = "sqlx-mysql not compiled — no mysql feature enabled, confirmed via cargo tree" },

    # RUSTSEC-2026-0002: lru 0.12.5 unsound IterMut.
    # We ONLY call .iter() (immutable) and .get()/.put()/.pop()/.clear() in cache.rs.
    # IterMut is never called. No patched version exists in 0.12.x range.
    # Track: upgrade to lru 0.13+ or replace with quick_cache when available.
    { id = "RUSTSEC-2026-0002", reason = "only .iter() used, not IterMut — not affected by the unsound API" },
]

[bans]
# Prevent duplicate versions of the same crate
multiple-versions = "warn"
wildcards = "deny"

[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
