[build-system]
requires = ["maturin>=1.8,<2.0"]
build-backend = "maturin"

[project]
name = "cuba-memorys"
version = "1.11.3"
description = "Persistent memory for AI agents — knowledge graph MCP server with 23 tools: sqlx-migrate, BM25 hybrid + MMR + OOD abstention + tiktoken budget, conformal prediction, testing-effect decay (Karpicke-Roediger 2008), Hebbian Δt-aware, Robbins-Monro Oja, source credibility tracking. Plus v0.8 features (project scoping, compaction snapshots, git-friendly sync, LLM-judge), Hebbian learning, RRF fusion, episodic memory, prospective triggers, Bayesian calibration, link prediction. PostgreSQL + pgvector, sub-millisecond."
readme = "README.md"
license = { text = "CC-BY-NC-4.0" }
requires-python = ">=3.9"
keywords = [
    "mcp",
    "memory",
    "knowledge-graph",
    "hebbian",
    "ai-agent",
    "anti-hallucination",
    "pagerank",
    "model-context-protocol",
]
classifiers = [
    "Programming Language :: Rust",
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "License :: Other/Proprietary License",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
]

[tool.maturin]
bindings = "bin"
manifest-path = "rust/Cargo.toml"
strip = true
